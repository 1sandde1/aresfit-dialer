<!doctype html>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AresFit Dialer</title>
<style>
body{margin:0;background:#080b10;color:#f5f6f8;font:14px system-ui,-apple-system,Segoe UI,sans-serif;display:grid;place-items:center;min-height:100vh}
.box{max-width:360px;padding:20px;text-align:center}
.muted{color:#9aa3b2;font-size:12px;margin-top:8px;line-height:1.4}
</style>
<div class="box">
  <strong>Loading AresFit Dialer v2...</strong>
  <div class="muted">Applying 2026-06-22 and 2026-06-29 app fixes.</div>
</div>
<script>
const ARES_V2_BASE_URL='https://raw.githubusercontent.com/1sandde1/aresfit-dialer/ba4fc91abef4c41451c6d74bc2cffa596a6ee719/aresfit-dialer-sandde-v2.html';
const ARES_V2_PATCH_URL='./aresfit-dialer-v2-2026-06-22.patch?v=2d342bdbec5a8275f76ef133f16a8d2e85196a1c';
async function fetchText(url){
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok)throw new Error(`${url} ${res.status}`);
  return res.text();
}
function applyUnifiedPatch(source,patch){
  const src=source.replace(/\r\n/g,'\n').split('\n');
  const lines=patch.replace(/\r\n/g,'\n').split('\n');
  const out=[];
  let srcIndex=0;
  let i=0;
  while(i<lines.length){
    const header=lines[i].match(/^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/);
    if(!header){i++;continue}
    const oldStart=Number(header[1])-1;
    while(srcIndex<oldStart)out.push(src[srcIndex++]);
    i++;
    while(i<lines.length&&!lines[i].startsWith('@@ ')){
      const line=lines[i++];
      if(!line||line.startsWith('diff --git ')||line.startsWith('index ')||line.startsWith('--- ')||line.startsWith('+++ '))continue;
      if(line.startsWith('\\ No newline'))continue;
      const mark=line[0];
      const text=line.slice(1);
      if(mark===' '){
        if(src[srcIndex]!==text)throw new Error(`Patch context mismatch at source line ${srcIndex+1}`);
        out.push(src[srcIndex++]);
      }else if(mark==='-'){
        if(src[srcIndex]!==text)throw new Error(`Patch remove mismatch at source line ${srcIndex+1}`);
        srcIndex++;
      }else if(mark==='+'){
        out.push(text);
      }
    }
  }
  while(srcIndex<src.length)out.push(src[srcIndex++]);
  return out.join('\n');
}
function replaceOnce(source,oldText,newText,label){
  if(!source.includes(oldText))throw new Error(`2026-06-29 email fix missing ${label}`);
  return source.replace(oldText,newText);
}
function applyEmailRealityFix(html){
  html=replaceOnce(html,
    '<div class="c-lbl" style="margin-top:8px">Manager busy</div><div class="tmpl-edit"><textarea id="tmpl-managerBusy"></textarea></div>\n    <div class="c-lbl" style="margin-top:8px">Not interested (polite)</div>',
    '<div class="c-lbl" style="margin-top:8px">Manager busy</div><div class="tmpl-edit"><textarea id="tmpl-managerBusy"></textarea></div>\n    <div class="c-lbl" style="margin-top:8px">Interested / options needed</div><div class="tmpl-edit"><textarea id="tmpl-interested"></textarea></div>\n    <div class="c-lbl" style="margin-top:8px">Not interested (polite)</div>',
    'template editor field'
  );
  html=replaceOnce(html,
    [
      "I'm Sandde, Director at AresFit. We supply commercial gym equipment from Nautilus, Star Trac, StairMaster, Schwinn and Jordan Fitness. If you've got anything coming up equipment-wise, happy to put some options together for whenever works for you.",
      "",
      "{SIGNATURE}`,",
      "  notIntPolite:`Hi,"
    ].join('\n'),
    [
      "I'm Sandde, Director at AresFit. We supply commercial gym equipment from Nautilus, Star Trac, StairMaster, Schwinn and Jordan Fitness. If you've got anything coming up equipment-wise, happy to put some options together for whenever works for you.",
      "",
      "{SIGNATURE}`,",
      "  interested:`Hi,",
      "",
      "Thanks for taking the time {SCHED_PAST}.",
      "",
      "As discussed, I'm Sandde, Director at AresFit. We supply commercial gym equipment from Nautilus, Star Trac, StairMaster, Schwinn and Jordan Fitness, and can put together options with pricing for replacements, additions or refurbs.",
      "",
      "You can see the website here: https://aresfit.co.uk/",
      "",
      "If finance is useful, the business finance page is here: https://aresfit.co.uk/pages/business-finance",
      "",
      "If anything comes up or you want pricing on specific kit, send it over and I'll put options together.",
      "",
      "{SIGNATURE}`,",
      "  notIntPolite:`Hi,"
    ].join('\n'),
    'interested template'
  );
  html=replaceOnce(html,
    "  {value:'managerBusy', label:'DM repeatedly busy / in meetings'},\n  {value:'notIntPolite', label:'Not interested but polite'},",
    "  {value:'managerBusy', label:'DM repeatedly busy / in meetings'},\n  {value:'interested', label:'Interested / needs options or pricing'},\n  {value:'notIntPolite', label:'Not interested but polite'},",
    'call reality option'
  );
  html=replaceOnce(html,
    "  managerBusy:'AresFit - equipment options',\n  notIntPolite:'Thanks for the chat',",
    "  managerBusy:'AresFit - equipment options',\n  interested:'Commercial gym equipment options',\n  notIntPolite:'Thanks for the chat',",
    'subject suggestion'
  );
  html=replaceOnce(html,
    "  if(recent.some(n=>n.outcome==='Not Int.'))return 'notIntPolite';\n  return 'cold';",
    "  if(recent.some(n=>n.outcome==='Not Int.'))return 'notIntPolite';\n  if(recent.some(n=>n.outcome==='Contacted'&&/\\b(interested|options?|pricing|quote|future|owner|dm)\\b/i.test(n.text||'')))return 'interested';\n  return 'cold';",
    'auto inference'
  );
  const oldLoop="  ['cold','receptionTransferred','managerBusy','notIntPolite','followUp'].forEach(k=>{";
  const newLoop="  CALL_REALITY_OPTS.map(o=>o.value).forEach(k=>{";
  const loopCount=html.split(oldLoop).length-1;
  if(loopCount!==2)throw new Error(`2026-06-29 email fix expected 2 template loops, found ${loopCount}`);
  return html.split(oldLoop).join(newLoop);
}
(async()=>{
  try{
    const [base,patch]=await Promise.all([fetchText(ARES_V2_BASE_URL),fetchText(ARES_V2_PATCH_URL)]);
    const html=applyEmailRealityFix(applyUnifiedPatch(base,patch));
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.body.innerHTML=`<div class="box"><strong>Could not load AresFit Dialer v2.</strong><div class="muted">${String(err.message||err)}</div><div class="muted">Refresh once. If it still fails, use the local v2 file from the Calling App folder.</div></div>`;
  }
})();
</script>
